body:
  text: 提要遂昌雜録小説家𩔖一雜事之屬臣等謹案遂昌雜録一卷元鄭元祐撰元祐字明徳至正丁酉除平江路儒學教授移疾去後七年復擢江浙儒學提舉卒於官本遂昌人其父希逺徙錢塘元祐又流寓平江其集以僑呉名而是録仍題曰遂昌不忘本也元祐以至正二十四年卒年七十一則生於前至元二十九年故書中所列人名上猶及見宋諸遺老下及見台哈布哈倪瓉杜本併見杜本之卒多記宋末軼聞及元代髙士名臣軼事而遭逢世亂亦間有憂世之言其言皆篤厚質實非輟耕録諸書摭拾冗雜者可比其記𦵏髙孝二陵遺骨事作林景熙與輟耕録異蓋各據所聞其稱南宋和議由於髙宗不由於秦檜宋既亡矣可不必更為髙宗諱亦誅心之論也樂郊私語小説家𩔖一雜事之屬臣等謹案樂郊私語一卷元姚桐夀撰桐夀字樂年睦州人順帝後至元中嘗為餘干教授解官歸里自號桐江釣叟至正中流寓海鹽時江南擾亂惟海鹽未被兵火尚得以閉户安居從容論述故以樂郊私語為名雖若幸之實則傷亂之詞也所記軼聞瑣事多近小説家言然其中如楊諤勒哲諤勒哲原作完者今改正武陵之㨗張士誠杉青之敗頗足與史𫝊相㕘所辨六里山天冊碑秦檜像贊魯訔註杜詩諸條亦足資考證末載楊維楨撰其兄椿夀墓誌一篇頗為不倫桐夀欲表章其兄何不叙之於書内乃别載於末核以體例深屬有乖今削除不載惟録桐夀之本書焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書遂昌雜録元鄭元祐撰髙昌㢘公諱希真字端甫由按察僉事累任㢘使後以薊國公致仕公嘗出其兄平章公諱希憲像面白晢如滿月冠巾團領袍手執孟子公嘗言先兄禮賢下士如不及方為中書平章時江南劉整以尊官來見先兄毅然不命之坐劉去宋諸生襤褸冠衣袖詩請見先兄亟延入坐語稽經紬史飲食勞苦如平生歡既罷某等兄弟請於先兄曰劉整貴官也而兄簡薄之宋諸生寒士也而兄加禮殊厚某等不能無疑敢問公曰此非汝輩所知我國家大臣語黙進退繫天下輕重劉整官雖貴背其國以叛者若夫宋諸生所謂朝不坐燕不與彼何罪而羈囚之況今國家起朔漠我於斯文不加厚則儒術由此衰熄矣公之卓識有若此哉宛丘公嘗言為吏吳下時吳守則趙公諱全也吳方内附頑民時時陸梁其獷甚故犯法者擒至加捶掠侯必叱令痛捶楚之雖死不貸若夫里正主首以徭役受捶者侯必瞑目嗟嘆曰以徵科受薄罰其何忍加重焉繼除杭州吳民泣送不忍舍之去時浙省以宗室大臣鎮之待憲臣如司屬槩可知而侯剛正不少屈至擒其家奴枷項以示衆久之不勝大臣之折辱也竟卒於杭時人擬以趙廣漢宋道士鄧山房先生者綿州人也諱道樞以齋科精嚴際遇理度兩朝一日謝后遣巨璫召至内後門泣降徳音且令其謫軍令狀使無洩后謂昨夜夢濟王大怒以為吾且將兵由獨松闗滅汝社稷后特㫖令鄧往南髙峰頂為謄心章哀告上帝已而黄頭先鋒斬闗吏而入宋亡鄧搆室吳下曰會通觀時浙西按察司治吳下按察使閻公子靜雷公苦齋胡公紫山徐公子方等皆與鄧相過從一日質諸鄧宋士大夫較之今日其所守何如鄧固辭不敢答諸公苦强之鄧曰此事不難見宋養士大夫厚其㢘隅可以守較之今則相去逺矣鄧髙士殁後五十年西臺中丞曹公士開訪元祐於呉下元祐僦屋湫隘時方暑中丞擕小殽酒以相餉遂往㑹通觀觀道士吳溪西者跛一足能學其師彈烏夜啼曲鼓琴未竟而郭公子昭曹公克明亦皆有所㩦而來吳遂出三四巨軸皆向時按察諸公與其師倡和詩也其間一卷則閻公子靜詩詩小序有謂昨日一謳者新到城當㩦爛煑牛脾與謳者同往與尊師飲酒聴歌玉蘃花下中丞歎息謂曹郭二公曰今日憲司官敢若是乎於以見國初文網雖甚䟱而上下樂易不難治今日正相反而治道益不如昔可勝歎哉宋亡故官幷中貴往往為道士若杭省馬院張太尉其一也其人長身廣顙宋為入内都知太尉國家以其内侍拘入朝遂傾家賄上下得以其子代如李丞相羅司徒皆是也羅李既貴悉顯其親族而張獨畏顧不敢奏僅撥平江田三十頃贍之得田後其父固已優裕無他望一日仁廟顧謂張曰汝有父母在乎張跪拜答曰母已亡獨父在為道人上曰封贈慶典曽及之乎張曰老父既寄迹方外不敢覬望後福上愀然不樂召中書省臣以為張哥在朝久矣而慶典不及其父母即命以其子爵秩貴之其父在杭固不知而是日頸痛重若為物所壓日重一日而仁廟所以貴之詞臣代言以降制制贈金紫光禄大夫大司徒上柱國徽政院使典謁卿閩國公賜玉帶金幣鈔物等又降特㫖江浙省臣浙西憲臣皆將㫖讌犒於其家比使臣至其父頸痛重殆不勝使臣即卧内宣㤙其父懵不知極品之貴使臣舉玉帶以視之始驚顧謂其所親者曰宋得賜玉帶者兩人福王賈平章爾然二人皆不佩服舉手一撫摩遂卒嗚呼顯宦貴祿信有命彼不知而妄求者可以為戒也夫師其姓者杭人家居拱北樓之西其家營利非一端而打銀其一也暗門外慧光庵尼無著者張循王九世女孫也以陋故不嫁而挟嫁貲故優裕師一日訪無著延師於飯飯竟出一銀香合重二十兩塵土蒙坌如漆黒無著誨師令其打一二十哲那瓌師持合至家剪開乃赤金也復裹合扣無著以香合金合也銀合耶無著笑曰銀合耳師以剪開合示之始知其為赤金若師者營利者也設心如此謂之無好人可乎余年三十許時識一老僧於吳江洲渚上老僧台人也時巳年七十餘為余言巴延丞相先鋒兵至吳是日大寒天雨雪老僧者時為承天寺行童兵森列寺前住山老僧某令其覘兵勢且将自刎無汚他人手行童震慄逺望有以銀椅中坐者以手招行童行童莫敢前且令軍士趣召之將至戒以無恐既至召令前問住山某和尚安否西廊下某首座安否行童大驚且戒令先往首座房致意首座僧大驚而銀椅中坐者已至房作禮笑問曰首座如何忘却耶某固昔時知命子寺前賣卜者也嘗宿上房踰半年已而偕至方丈拜主僧主僧錯鍔謾不省扣之乃言曰我尤宣撫也今日尚何言即命大鍋煑粥㗖兵人令兵人持招安牓而令行童以吳語誦牓文曉諭百姓於此始知尤公探諜江南凡八年至以龍虎山張天師符籙取驗於世祖皇帝云尤公乆於江南探諜南士人品髙下皆悉知之時江淮省改江浙省自維揚遷錢塘尤公因陞平章郡有天慶觀即今𤣥妙觀杭髙士禇雪巘先生諱師秀自宋以清苦節行聞一日尤公單騎從一童至天慶方丈觀主王管轄者尚不知為平章尤公乃自言觀主大驚尤公曰我欲一拜禇髙士耳觀主謂其人孤僻士宰相何取而欲見之尤公意彌堅觀主扣房門髙士方讀書聞扣户聲問為誰觀主以姓名對髙士曰主首不游廊管轄何為至此觀主以山門急切事語之乃啟户觀主言平章請見髙士拒之曰某自來不識時貴人而平章顧已拜於地意欲髙士延坐其室即鎻户偕行廊廡間平章卑抑敬之愈甚至雲堂前語平章曰三年前有閬州王髙士嘗留此某則非其人也因長揖竟出尤公顧瞻嗟咨曰是真一世之髙士公毎出見杭士女出遊仍故都遺風前後雜㳫公必停輿或駐馬戒􅅚之曰汝輩尚瞢瞢睡耶今日非南朝矣勤儉力作尚慮不能供繇役而猶若是惰遊乎其時三學諸生困甚公出必擁遏呌呼曰平章今日餓殺秀才也從者叱之公必使之前以大囊貯中統小鈔探囊撮與之公遂建言以學校養士從公始杭西北羊角埂埂上全真小庵士人羅蓬頭者非痴非狂冬夏惟一衲衣居庵一室中無坐卧具惟晝夜蹲地上穢汚殊甚而往往能前知一張其姓者故宋主表司宋亡依道舘嘗舒手向羅問吉凶羅書狗災二字張問應在幾時書百日内張持齋誦道經日禱於神明冀免難一日見牝牡狗以苕箒擊之竟為狗所傷而死閩人馬都録者號靜齋以道法際遇度宗賈平章以海味進謝后令㗖之泄㵼不止馬進符水飲之而愈后召馬賜與之馬騃戅因謝恩自致其言曰臣上告佛佛繼今他人進飲食不可造次供御言出口而賈顧已知之甫出禁門即下臨安府獄面刺雙旗押付鄷都寨日具存亡時以江上事危出師有日以故寨兵寛之得不死復於寨村落間禱雨有驗未幾宋亡崔中丞奉㫖訪好人薦馬於世皇道法復有驗宣授浙西都道籙提㸃西太乙宫恩賞殊優渥一日大雪訪羅於全真庵問未來休徵羅書賀字復書正字遞之但曰問知堂知堂者率意曲解既而明年正月宣一州賀雷巖賫璽書宣命截替馬前職云雪晴道凍鹽運司一卒張某問羅未來事筆硯皆凍不可書卒怒捽蓬頭知堂勸止之烘筆硯為書千二錢卒大笑以為我此行勾四場鹽官所望數百緡而僅書若此已而卒出門道狹冰凍一蒼頭擔酒四缶來卒撞之酒墜地蒼頭者持卒哭曰我方千二錢買酒來須償我乃得去卒償鈔竟入門謝羅曰吾仙信有先見哉凡逐利市人問休咎其人將稱意必書其手曰鈔好仍乞鈔買酒肉㗖已幷衆人否則搖手終不為一書後將死大笑拍手歌唱立地卒羅盖仙者惜其事遺落故所聞止此宋僧温日觀居葛嶺瑪瑙寺人但知其畫葡萄不知其善書也今世𫝊葡萄多假其真者枝葉􅂡梗皆草書法也酷嗜酒楊總統以名酒㗖之終不一濡唇見輒忿詈曰掘墳賊掘墳賊惟鮮于伯機父愛之温時至其家袖𤓰㗖其大龜抱軒前支離叟或歌或笑毎索湯浴鮮于公必躬為進澡豆其法中所謂散聖者其人也支離叟即伯機家所種松也宋巨璫李太尉者宋亡為道士號梅溪元祐童時嘗侍其游故内指㸃厯厯如在獨記其過葫蘆井揮涕曰是盖宋時先朝位上釘金字大牌曰皇帝過此罰金百兩宋家法之嚴如此他則童騃不能記憶也宋京畿各郡門有激賞庫郡有慈幼局遇盗發郡守開庫募士故盗不旋踵擒獲貧家子多輒厭之故不育乃許其抱至局書生年月日時局有乳媪鞠育之他人家或無子女却來取於局嵗祲子女多入慈幼局故道無抛棄子女信乎其恩澤之周也積雨雪亦有鈔雖小恵然無甚貧者亦此之由故老言賈相當國時内後門火飛報已至葛嶺賈曰火近太廟乃來報言竟後至者曰火已近太廟賈乘兩人小肩輿四力士以槌劒䕶轎里許即易轎人倐忽至太廟臨安府已為具賞犒數勇士陞轎離地五六尺前樹皂纛列劊手皆立具於呼吸間賈下令肅然不過曰火到太廟斬殿帥令甫下火沿太廟八風兩殿前卒肩一卒飛上斬八風板落火即止驗姓名轉十官就給金銀賞與賈才局若此𩔖亦可喜傅景文云宋太學生東嘉林景曦字霽山當時楊總統發掘諸陵寢時林故為杭丐者背竹籮手持竹夾遇物即以夾投籮中林鑄銀作兩許小牌百十繫腰間賄西畨僧曰餘不敢望收其骨得髙宗孝宗骨斯足矣畨僧左右之果得高孝兩廟骨為兩函貯之歸葬於東嘉其詩有夢中作十首其一絶曰一抔未築珠宫土雙匣親傳竺國經只有春風知此意年年杜宇哭冬青又曰空山急雨洗岩花金粟堆寒起暮鴉水到蘭亭更嗚咽不知真帖落誰家又曰橋山弓劒未成灰玉匣珠襦一夜開猶記去年寒食日天家一騎捧香來七首尤悽然則忘之葬後林於宋常朝殿前掘冬青樹一株植於兩函土堆上又有冬青花一首曰冬青花冬青花花時一日腸九折隔江風雨清影空五月深山落微雪移來此種非人間曽識萬年觴底月後忘之又一首有曰君不記羊之年馬之月霹􅋬一聲山石裂聞其事甚異不欲書若林霽山者其亦可謂義士也已宛丘公䕶其先府君櫬歸葬時一舟載靈櫬宛丘公守櫬舟中一舟載家累子期與其母夫人在焉舟過金山舟人以便風大繩維兩舟並行子期將過宛丘公船失脚墮江水公震慄重賞令救比卸帆停舟須良久而子期若有人捧出水面者終不没今登政府豈偶然云義興岳君仲逺家唐門其上世本田家至仲逺所生父與其叔皆選京學上舍家貲産非過厚而能折節下士賓客至如歸焉故南北士大夫無不至其家者南士若牟誠甫蔣泰軒蔣竹軒姚子敬羅壺秋其顯者若趙文敏公至與之婚姻當世貴官如髙房山㢘端甫國公李息齋學士其從兄李信菴處士鮮于伯機經厯仲逺皆傾心與之交然自至治已後郡縣狼牧羊家事日不如日後為漢陽縣尹坐掠死非辜遭降黜欝欝而没仲逺昆季凡十三人皆陵替不振囘首未二十年宜興諸富家亦相次淪落是皆廢興雖有命然為官司所朘剝雖積銅為山尚不給況齊民乎金華三胡先生長誠仲次穆仲次汲仲石塘人也最知名誠仲子無咎已殁穆仲子孔章今為吳郡經師汲仲子千里家建昌石塘先生以崔中丞薦世祖顧問所答不稱㫖出為揚州路儒學教授師道甚嚴繼除建昌教權録事司程雪樓學士家遺漏先生捕其子坐罪不貸由是人憚之後除台州臨海簿愛縣民如子上司誅求身當之素客於杭居貧甚以古文倡人求記碣序賛稍不順理雖百金不作也後以室人䘮居䘮如禮然所居湫隘甚遷居青蓮寺講道寺中性矯亢當時斯文顯者鄧巴西㢘使故毁辱之由是益下遷後為鹽場司丞就養建昌浙省以是年秋試屈先生為試官後來青蓮寺殁寺中殁時當嚴冬尚未挾纊是日元祐往候之項可立煑三建湯飲之猶力疾答揚州盛恕齋語次又訓􅅚學者以自樹立氣益索扶之上卧榻即跏趺坐逝比殮顔貌如生時殮後天台周本心時為浙省掾率道徒私諡修道先生發引還建昌省憲官皆執紼以送今三十年矣先輩淪落如先生抗直不撓以斯文自任者絶無之穆仲先生純徳古君子經學尤粹深有三書辨尚書或問行於世今中奉大夫浙東元帥白埜台哈布哈君由越守召入為祕書郎未幾母夫人殁於越白埜君還越持䘮戒珠寺朝夕臨屛葷血不脱絰帶家人欲一見其面不可得也既畢葬服闋乃始復初近世禮俗壞如君者盖甚寡今以海冦逋誅留斗城未返令人念之不忘杭人王溪月諱壽衍字眉叟少年為道士便際遇晉邸其所交皆公卿大夫後以𢎞文輔道粹徳真人管領開元宮江浙省都事劉君諱致字時中海内名士也晩年尤清勁既卒貧無以葬王真人者躬至其家弔哭甚哀周其遺孤舉其䘮葬之徳清縣某鄉之原與其夀穴相近春秋拜掃若師友然異教中若溪月者盖可尚歟梁溪王文友諱仁輔克苦讀書里人倪文光諱昭奎者延之以教其兩弟曰子瑛曰元鎮居久之文光殁而子瑛騃元鎮出應門户不勝州郡之朘剥也資力遂耗減已而子瑛卒家中乾元鎮刓無作有以濟朋友㑹文友卒元鎮買油杉棺葬之芙蓉峰傍葬之日梁溪士友皆至葬文友後元鎮窘於誅求顧未有能振之者閩人鄭所南先生諱思肖宋有國時其上世仕於吳宋亡遂客吳下聞其有田數十畆寄之城南報國寺以田租入寺為祠其祖禰遇諱日必大慟祠下而先生并館穀於寺焉先生自宋亡矢不與北人交接於友朋坐間見語音異者輒引起人知其孤僻故亦不以為異其上世本業儒者也而先生於佛老兩教則皆喜其説有祭鬼法平日喜畫蘭踈花間葉不求甚工其所自賦詩以題蘭皆險異詭特盖所以輸寫憤懣云吳人好事者為板刋其所謂錦錢集者行於世若先生在周為頑民在殷為義士盖不易窺其涯涘云謝臯羽先生諱翺自號晞髮處士讀書博學宋季以古文知名鄧中齋先生諱剡字光薦宋丞相信國公客也宋亡以義行著其所賦鷓鴣詞有曰行不得也哥哥瘦妻弱子羸牸䭾天長地濶多網羅南音漸少北音多肉飛不起可奈何行不得也哥哥其意可見其所賛文丞相像有曰目煌煌兮䟱星曉寒氣英英兮晴雷殷山頭碎柱兮璧完血化碧兮心丹嗚呼孰謂斯人不在世間鄧牧心葉本山兩先生皆髙節士宋亡深𨼆大滌山鄧先生於古文尤精覈不茍作承其學者杭人李坦之諱道坦坦之詩亦工然傷於巧云龍虎山張一無字善式其先在宋簮纓家也四世皆以其資讓故其家有讓堂至一無始入龍虎山為道士在道𣲖張開府幾世孫也雖已為道士酷喜禪學於是入天台山禮普應國師咨稟㕘决志堅甚衆中道衣檀簡不訝也道家者流以其術應承尚方與俗葢無别而一無獨持齋素行克苦以故其徒憎之先是杭城開國師道場隨處有仝㕘者亦多留一無而呉大宗師每念一無志髙潔為奏文德先生降璽書以䕶之留一無住京師㑹呉宗師老病繼掌其教者惡一無痛凌辱之一無懼甚遂以病卒京師兩浙鹽運使瞿琹軒諱霆發下沙人内附後以貲雄為提舉遊大滌山山中人亦富贍瞿至日開宴張樂瞿一不少答踰數日索轎登天目便厚襯飯寺僧時髙峰妙禪師坐死關須鹿盧輓籃輿乃得上下瞿入死關故師語之云為遊山翫水來為生死大事來瞿但泣涕曰弟子不㑹師擲竹箆云不探虎穴安得虎子瞿欲捐田寺中挾寺僧一人還下沙以田若干頃歸之歸之日僧以田劵呈師師大怒叱令速還瞿語之曰平常山中無田苦苦也過了今日欲得田造業耶僧至下沙以劵還瞿瞿曰僧輩可謂無識此等細事何必令老僧知後為天目山建大覺師子院久之瞿老病盡遣其婢妾以資分與諸子女戒勿來見我日與道者一人煮粥飲之翛然而卒若瞿者可謂異乎常人者矣貴溪祝蕃逺先生諱蕃里人陳靜明先生於朱陸兩先生仝異處研究得其指歸蕃逺從學勵精勇鋭不徇世習以守師説葢嘗以鄉舉上京邑見黜於㑹試以官至郴州路經歴郡獄有寃蕃逺直之而當坐監郡部使者不謂蕃逺直以憤鬱卒於郡士論惜之江右杜君諱本字原父號清碧先生苦志於學經史多手寫成集沈黙寡言笑嘗一再遊京師王公貴人多樂與之交已得武夷詹君景仁由三公掾授浙東憲府照磨延先生南入武夷且買房置田為久逺計已而朝廷修三史蒙古色目漢人南人各舉一處士君以南人處士徵授翰林待制奉訓大夫出至錢塘以病歸其歿於至正十年秋八月道逺不能弔令人感念云江浙儒學提舉柯山齋諱自牧嘗過訪胡穆仲先生時天大寒日出已久而胡先生尚未起柯曰何為先生曰天寒未挾纊故尚卧耳於是柯往宗陽宫語杜南谷尊師曰胡穆仲苦寒無綿襖尚僵卧在家杜即惻然攜十兩絮兩縑絹往遺之先生堅拒不肯受杜強之而先生怒已而寒解柯問先生曰何為不受先生笑曰杜名道堅嘗云某為談朋炒也要教他知得亦有不炒他的夫杜異教能賢而先生清節若是要皆難得云柯之子字敬仲諱九思際遇文廟官至儒林郎奎章閣鑒書博士卒於呉謝后既北遷其支裔在杭者固多謝君退樂一人也退樂嘗言江南始内附有所謂李信卿者自北來謂其能相人能望氣崖岸倨甚退樂以貴官咸敬之亦設早饌以延致之李至即中坐省幕官皆下坐不得其一言以及人禍福時趙文敏公謂之七司户固退樂姻戚也屈公來同飯時文敏風瘡滿面李遙見即起迎文敏謂衆人曰我過江僅見此人耳瘡愈即面君公輩記取異時官至一品名滿四海李之術亦精矣襄陽未破時世祖令其即軍中望氣行踰三兩舍即還言於世祖曰臣見卒伍中往往有公輔貴人襄陽不破江南不平何處着許多富貴人嗚呼此與南衙士卒皆將相者何異哉宋季琴士汪水雲者工於詩詩皆清麗可喜杭城未破其詩有曰西塞山邊日落處北闗門外雨來天南人墮淚北人笑臣甫低頭拜杜鵑又曰錢塘江上雨初乾風入端門陣陣酸萬馬亂嘶臨警蹕三宫灑淚濕鈴鸞童兒賸遣追徐福厲鬼終當滅賀蘭若説和親能活國嬋娟剰遣嫁呼韓題王導像有曰秦淮浪白蔣山青西望神州草木腥江左夷吾甘半壁只縁無淚灑新亭聞水雲後從謝后北遷老宫人能詩者皆水雲指教或謂􅘵國公喜賦詩亦水雲教之今嘉議大夫吏部尚書致仕許昌馮公名夢弼字士啟其始仕由八蕃雲南宣慰司吏繼辟掾湖廣省士啟嘗言其在八蕃時乘驛出向某所最後至一驛驛吏語以今夕晚矣且馬絆出在江上不若毋行士啟漫不省即選馬亟行行未三四十里忽烏剌赤者急下馬拜跪伏其言侏離莫能曉而其意則甚哀窘士啟問之搖手意謂且死矣於是士啟亦下馬禱之曰某萬里逺客從吏遐方使有禄命固不死無之敢迯死時月微明覩一物如小屋大竟衮入江水腥風臭浪襲人行數里許乃問之烏剌赤曰是之謂馬絆問馬絆何物搖手不敢對三更後至前驛驛吏出迎錯愕曰是何大膽敢越馬絆來乎士啟問馬絆驛吏乃言此馬黄精也遇之者輒為所啖齊諧志怪而畧此於是乎書中奉大夫西臺侍御曹南馮公諱翼字君輔為中臺監察御史時嘗與一蒙古御史並馬行蒙古馬肥健嘗先一舎行馮馬老痩策莫前道遇一醉漢因見馮馬羸衣笠敝用捶策馮馬三四鞭前行御史亟呼曰監察御史為人捶憲度墜矣亟捕捶者毋貸馮舉手謝曰無是無是醉漢竟躍馬去前御史至察院語同僚曰馮御史道中為人所捶我命捕之而馮曾不恤惡有是耶語竟馮至同僚迎謂曰何故馮謝以無事前行御史怒曰如此則是我妄言馮因起立語衆人曰某本疏逺下僚朝廷不以某無似擢寘言路已二十日矣天下大事未有小建明而先與醉人競曲直諸僚曰繼此有言我輩得預聞耶馮笑而不答已而成廟駕下陪京公朝服拜道左進疏十事皆天下大事云國初富初菴先生以占筮起東南時錢塘初内附以故都生聚既繁貲力殷盛世皇占其後來如何既成卦而富猶未之知也世皇曰我占宋故都富對曰誠如所占其地五六十年後㑹見城市生荆棘不如今多也今杭城連厄於火灾復困於科繇視昔果不逮富之占亦神矣此事得於廉薊公云錢塘湖上舊多行樂處西太乙宫四聖觀皆在孤山宋雖遷僧寺建宫觀於其上而六一泉寺喜鵲寺皆遷北山亦各擅山水之勝西太乙成後西出斷橋夾蘓公堤皆植花栁而時時有小亭館可憩息若夫宫之景福之門迎真之館黄庭之殿結搆之巧丹臒之嚴真擅蓬萊道山之勝四聖觀雖建於髙宗朝其規制相去逺矣余童時尚記孤山之隂一山亭在髙阜上曰嵗寒繚亭皆古梅亭下臨水曰挹翠閣上下皆拱斗砌成極為宏麗葢盧董兩璫以内府錢建西太乙宫又能以其餘資建兩閣亦可謂能事嘉木揚喇勒智奪為僧窟今皆無一存荒榛滿目可勝嘆哉和靖先生豈有含珠者嘉木揚喇勒智亦發其墓焉聞棺中一無所有獨有端硯一枚余童時尚見一碑鐫和靖先生墓五大字仆草中久之余山中以浙省儒學提舉有心力於先生墓上悉力起廢水濱仍建學士橋傍山建祠宇塑先生像於其中今後數年矣聞又荒落何賢者之不幸哉河西僧馮某者與嘉木揚喇勒智同里㓜同學情好益甚相同而相得也既在江南掘墳遂以書招馮出河隴來江南既至道以杭故宋富貴家十墳遣馮使之發掘馮父子皆僧也十墳已掘六金寶葢不貲餘四墳方擬發掘而馮父子兩人是夜皆得夢夢林莽中金紫官人出拜哀告曰君父子所得亦足矣我輩安居於此久矣早晩幸貸我父子覺而俱驚此四墳於是乎獲全嘉木揚喇勒智敗後五十年間此曹無一存者馮之父居杭西湖北山余對隣而其子則居昭慶寺之東余未成童時從臧湖隱先生讀書先生宋京學生也有屋六七間與岳墳相對時岳墳漸圮江州岳氏諱士迪者宋迪功郎於王為六世孫與宜興唐門岳氏通譜合力以起廢墳與寺復完整久之王孫有為僧者居墳西大壊廟與寺至靡有孑遺台僧可觀者堅忍人也以其事訴之上司官府時何怡真為湖州推官柯敬仲以書白其事寺田典與人者復歸而寺與廟寸椽片瓦不留㑹江西李全初為總杭府經厯慨然以興廢為己任勸勉王華甫者捐貲興建於是寺與廟稍稍復完余為記忠烈廟其大致以王起卒伍至將相謀審戰勝規模施設雖古名將不是過一時渡南諸帥臣不論也而髙宗昏孱竟斃王於權姦之手論者乃謂余譏貶髙宗太甚夫宋有國時固當為其君諱而歸罪於秦檜宋亡矣髙宗忘父兄之深讐彼秦檜者復何恨使髙宗倚王以雪恥天下為王有尚何慊况王忠義上通於天而髙宗昏孱莫之識論者豈得以余言為過甚哉錢塘門西出石函橋河西僧三寶者壘石與磚為西番㙮舊無有也今四五十年矣想㙮未能如舊也㙮南即宋放生池舊碑磨去髙文虎誤用事所謂夏王道傳語商王這鳥獸魚鱉元來是你西去即保叔㙮山脚下有大石世𫝊秦始皇纜船石喻彌陀勸人修西方淨業畫丈餘彌陀遇埧頭行刑日彌陀張大像頌佛號其用勤矣正鑿纜船石為大佛頭耳竅可坐七人其大可知柬臨湖白雲宗寺西則水月園由山而上則相嚴寺寺西石磴直上則叔寶㙮也下則多寶寺寺西宋詩人孫花翁墓也墓西嘉澤廟祠西湖龍王蘓文忠公題和靖處士像語結謂不然配食水仙王一盞寒泉薦秋菊祠西小寺忘其名稍西復陟巘瞿運使􅅟宇在焉後捨為善住閣其間有山中四時小􅆤横幅安樂窩之𩔖其結搆皆明敞可喜稍西為夀星寺寺有寒碧軒蘓文忠公題詩尚在寺稍西陟磴而上為江湖偉觀文忠公所謂一舸䲭夷江海去尚餘君子六千人余嘗與張貞居欲登偉觀則磴道壊不復有其處矣寺西則瑪瑙寺寺南養樂園園中花卉湖石杉檜尚存臨湖飛樓雄麗賈相養其母夫人車船自其第茶頃便至園園有悦生堂前有亭今歸呉中周僉省園北出稍西復登巘則玉清宫也宫北户直上為初陽臺臺有亭倚亭而望盡得西湖之勝復有屋數間祠葛仙翁宫西為閣山寺為六一泉寺為圓明寺寺西則栖霞嶺嶺下為岳王墳南臨湖為褒忠寺寺為其孫毁今遷寺忠烈廟後岳墳西則冲虚宫宋寧宗老宫人為女冠所建也宫西為耿家步余先人舊居與宫正相對今屢易主矣由耿家步而西為東山庵庵有女冠神宫火後僅彷彿爾内附後僧建靜勝寺殊宏壯杭人賀長卿官至海道萬户府照磨自言其年十五六時草履行縢手執小黒傘八月十八日與鄉曲五六人同往錢塘江觀潮臨水涘而觀者如織忽一人捶長卿背兩拳長卿急翻身捽捶者則仝前觀潮之人皆為怒潮潑去死生有命豈偶然哉閩人陳無夢館授洞霄宫郎一山之道房無夢飲酒一盃亦醉一日天大暑午後醉憩卧榻上忽清風颯至凉甚繼有一物如猴狀目光烱然自山飛下檻前無夢因曰此所謂山鬼者歟俟其至捽取之然後呼人束縳之將至無夢起欲摶之手足皆僵不可動急呼人則喉已閉窘甚急禱於神明曰北極佑聖真君此物即去無夢便甦後因為道士山鬼木客固有之葢亦無夢非顯者因見之歟季君玉松江人後居杭州之五房子孫五世克相見君玉自言本王萬三官人家齋産王氏在宋季以貲雄宋亡富尤甚王至儉而諸子皆不肖時朱張方興誘其諸子使假貸立劵責厚息以償久之王卒貲産盡為兩家奄有獨其孫有所謂王東廬者僅存腴田三十頃為養老計而某氏時時遣人存恤之東廬俟其生日以厚禮往為夀某氏既見歡甚時運糧千户以下皆用其私人呼一千户邀東廬者往觀海船觀十餘艘忽大怒縳王在船時君玉實從者令皆縳留東廬不省泣告千户問以何罪千户者曰汝罪在留田汝不以留田歸相公令我縳汝投之海東廬泣曰我存此為饘粥計相公何太忍耶千户者怒即以非罪考掠其幹者東廬不得已遂手書劵以田歸之所直償以蕃舶上物十纔一二國家信其言開海道運糧於今六七年矣彼小人行險僥倖惟利是趨其致富如君玉所言宜其死有餘戮云朱瑄張青為元海運者呉人鄭元字長卿内附後其大父為北鈔庫大使庫後火打勘得少蘓長卿之先君子乃從吏以養大而甚不如昔一日天大雨一人倉皇走至長卿家若避雨然者既去乃遺一小篋挈之重開視則金葉也長卿大父一不令人知翌日早作坐門外聞人言乃謂昨夜汪家府前王集者失却一篋金葉其家兄弟大閧長卿大父聞之即物色王氏家以還之大父每月朔必炷香城隍廟於道拾得一絹囊亦黄白物也訪其媪還之今長卿棄吏從儒兼精醫藥為雅飭君子而王氏兄弟者白首尚無恙能言其事云今河南行省參知政事宛丘趙公名頥字子期其先府君宛丘公諱祐字天錫為江浙行省照磨時余客於其家宛丘公嘗言其家在陳州有瓦屋一横人稱為趙總把家國家毎嵗秋統兵官將兵哨江南比至縣民間竟歇泊初至極嚴毅再嵗三四嵗情契如故一日哨馬南歸睹一纍囚兩足凍垂墮呻吟饑凍馬足間宛丘之父問囚為誰囚顰蹙曰我南宋官人廬州通判胡某城破為所擄公父復問如此汝則是秀才囚復曰我春秋登科公文曰汝如此則能教學否囚曰豈有秀才而不能教學者乎公父請於統兵官用兩馬易得之浣濯以湯液包裹以氈毳温糜酒以飲食之絶而復蘓蘓則兩足墮矣因問其姓名籍貫遂延致其家以教迪諸子方是時淮以北舉不知有全書胡通判以其所憶記授諸生更六年而後殂因葬之屋後臨歿謝宛丘公之家曰我分死六年前矣重為汝家所延汝之家後必有斯文顯者逮子期登丁卯科用文儒登政府而其二代皆封二品信乎斯文之報可徵云宛丘公無􅂡眉面微黄如老嫗然剛正宏毅江南既内附辟掾平江路時庫内扄鐍尚未嚴一日乗馬出見兩兵縶一民前挂小絹囊公問兵何為兵曰是盜官庫金銀某擒至此公因愕謂盜曰汝固我所遣因與偕至庫問兵曰彼所取止如此兵曰然遂留盜使兩兵封識訖遣兵出戒盜曰盜官物法當斬汝亟去慎勿復至此死矣此事呉人白仲章得於其父所言云宛丘公官至財賦副總管公委至呉呉固公辟掾訪其隣舊戒其僕曰汝至人家須鞠躬屏氣叩門問人有無汝但曰前路吏趙天錫慎毋曰趙總管趙總管云視自炫顯重者有間矣遂昌雜録
